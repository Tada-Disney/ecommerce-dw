version: 2

models:
  - name: stg_customers
    columns:
      - name: customer_id
        tests:
          - unique
          - not_null
      - name: email
        tests:
          - not_null
      - name: customer_tier
        tests:
          - accepted_values:
              values: ['BRONZE', 'SILVER', 'GOLD']

  - name: stg_products
    columns:
      - name: product_id
        tests:
          - unique
          - not_null
      - name: unit_price
        tests:
          - not_null

  - name: stg_orders
    columns:
      - name: order_id
        tests:
          - unique
          - not_null
      - name: customer_id
        tests:
          - not_null
      - name: product_id
        tests:
          - not_null
      - name: order_status
        tests:
          - accepted_values:
              values: ['completed', 'returned', 'cancelled']